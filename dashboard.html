<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Deshboard</title>

    <!-- tailwind & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet  -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- font-awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
 <header class="shadow">
    <div class="w-[1600px]  m-auto flex justify-between py-5 items-center"> 
        <!-- logo section  -->
        <div class="flex items-center gap-4">
                <img class="w-[50px]" src="./assets/github-logo.png" alt="">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>    
        </div>
        <!-- search bar  -->
        <div >
            <form action="" class="flex gap-4"> 
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                    >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search issues..." />
                </label>
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue </button>
            </form>
        </div>
    </div>
</header>

<section class=" w-[1600px] mx-auto space-y-10">
    <div class="flex gap-3 border border-gray-200 rounded-[10px] p-5 mt-10"> 
        <button onclick="toggleStyle('btn-filter-all')"  class="btn bg-[#4A00FF] text-white py-2 px-6 rounded-[10px]" id="btn-filter-all">All</button>
        <button onclick="toggleStyle('btn-filter-open')" class="btn py-2 px-7 rounded-[10px] " id="btn-filter-open">Open</button>
        <button onclick="toggleStyle('btn-filter-closed')" class="btn py-2 px-7 rounded-[10px]" id="btn-filter-closed">Closed</button>
    </div>

    <div class=" shadow-sm rounded-2xl rounded-2xl ">
        <!-- Issues Count  -->
        <div class="flex  justify-between items-center border rounded-2xl border-gray-200 p-5 shadow-sm ">

            <div class="flex gap-4">
                <img class="w-[40px] h-[40px] bg-[#ECE4FF] p-1 rounded-full" src="./assets/Aperture.png" alt="">
                <div> 
                    <div> 
                        <h4  class="text-xl font-bold"> <span id="counter"> 0 </span> Issues</h4>
                    </div>
                    <p>Track and manage your project issues</p>
                </div>
                
            </div>
            <div class="flex gap-4 text-xl " >
                    <p> <span class="text-green-600"><i class="fa-solid fa-circle"></i> </span>Open</p>
                    <p> <span class="text-purple-600"><i class="fa-solid fa-circle"></i> </span>Closed</p>
                    
            </div>
        </div>

        <!-- All Issues Card  -->
        <div id="issues-card" class="grid grid-cols-3 gap-5 my-10 p-5 ">
        </div>
    </div>

    <!-- Modal  -->
    <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

    <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="modal-container"></div>  
            <!-- modal div  -->
            <!-- <div class="">
                <h2 class="font-bold text-2xl">Fix broken image uploads</h2>

                    <ul class="flex list-disc gap-8 pl-5 text-sm">
                        <li>Opened by Fahim Ahmed</li>
                        <li>22/02/2026</li>
                    </ul>
                </div>

                <p class="text-orange-500 bg-orange-200 border border-orange-400 rounded-full px-4 py-1"> <i class="fa-solid fa-life-ring"></i>${card.labels[1] ? card.labels[1] :"N/A"}</p>
                </div>
                <p class="text-sm">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
                <div class="flex justify-between items-center  bg-[#F8FAFC] p-3 rounded-2xl">

                        <p class="text-sm mb-1.5">Priority:</p>
                        <button class="bg-red-500 py-1 px-4 text-[14px] rounded-full border-none text-white ">High</button>
                    </div>
                </div>


            </div>      -->
            
            <div class="modal-action">
            <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn btn-primary">Close</button>
            </form>
            </div>
        </div>
    </dialog>
</section>
 
    <script src="./script.js"></script>
</body>
</html>
